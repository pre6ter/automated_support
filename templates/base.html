<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Automated Support</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('main.index') }}">Automated Support</a>
      <span class="muted">локальный помощник для ответов на письма</span>
      <nav class="topnav">
        <a href="{{ url_for('main.index') }}">Письма</a>
        <a href="{{ url_for('main.chat') }}">Чат</a>
      </nav>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <section class="alerts">
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
